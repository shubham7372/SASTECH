[build]
  command = "npm run build"
  publish = "dist"

# ── SPA fallback ──
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Force HTTPS (redirect HTTP → HTTPS) ──
[[redirects]]
  from = "http://sastechs.in/*"
  to = "https://sastechs.in/:splat"
  status = 301
  force = true

# ── Canonical Domain (redirect netlify.app → sastechs.in) ──
[[redirects]]
  from = "https://sastech.netlify.app/*"
  to = "https://sastechs.in/:splat"
  status = 301
  force = true


# ── Security Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    # Enforce HTTPS for 1 year, include subdomains, allow preload list
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Prevent clickjacking — only allow your own site to frame pages
    X-Frame-Options = "SAMEORIGIN"

    # Block MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Enable XSS filter in older browsers
    X-XSS-Protection = "1; mode=block"

    # Control referrer information sent with requests
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Restrict browser features/APIs
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"

    # Content Security Policy — allow your own content + trusted CDNs
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://api.razorpay.com https://*.razorpay.com; frame-src https://api.razorpay.com https://*.razorpay.com; object-src 'none'; base-uri 'self'; form-action 'self'"
